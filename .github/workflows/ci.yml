name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
      - name: Install veraPDF
        run: |
          wget -q https://github.com/veraPDF/veraPDF-apps/releases/download/v1.25.1/veraPDF-greenfield-1.25.1.zip
          unzip -q veraPDF-greenfield-1.25.1.zip
          sudo mv veraPDF-greenfield-1.25.1/verapdf /usr/local/bin/
      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q
